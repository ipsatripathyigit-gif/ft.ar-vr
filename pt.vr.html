<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
 <script>
AFRAME.registerComponent('random-move', {
schema: {
speed: {type: 'number', default: 0.02}
},

init: function () {
this.direction = Math.random() * Math.PI * 2;
},

tick: function () {
let pos = this.el.object3D.position;

pos.x += Math.cos(this.direction) * this.data.speed;
pos.z += Math.sin(this.direction) * this.data.speed;

// Change direction randomly
if (Math.random() < 0.01) {
this.direction = Math.random() * Math.PI * 2;
}
}
});
</script>       
<a-gltf-model src="Beagle.glb" random-move  position="0 0 0" scale="0.02 0.02 0.02"></a-gltf-model>

     </a-scene
  </body>
</html
